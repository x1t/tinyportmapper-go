# golangci-lint configuration
# https://golangci-lint.run/usage/configuration/

version: "2"

# 运行配置
run:
  # 超时
  timeout: 5m
  # 并发数 (0 = 自动)
  concurrency: 0
  # 是否启用 go module
  modules-download-mode: readonly
  # 跳过目录
  skip-dirs:
    - vendor
    - third_party
    - testdata
    - .git
    - .idea
    - .vscode
    - bin
    - pkg
  # 跳过文件
  skip-files:
    - ".*\\.pb\\.go$"
    - ".*\\.gen\\.go$"
    - ".*_test\\.go$"

# linters 配置
linters:
  # 启用 linters
  enable:
    - errcheck        # 检查未处理的错误
    - gosimple        # 简化代码
    - govet           # 可疑构造检查
    - ineffassign     # 无效赋值检测
    - staticcheck     # 静态分析
    - unused          # 未使用代码检测
    - gocyclo         # 圈复杂度检查
    - misspell        # 拼写检查
    - gofmt           # 代码格式化
    - goimports       # import 检查和排序
    - unconvert       # 不必要的类型转换
    - dupl            # 代码重复检测
    - wsl             # 空行检查
    - whitespace      # 空白字符检查
    - bodyclose       # HTTP 响应体关闭检查
    - noctx           # 检查 http handler 的 context 使用
    - sqlclosecheck   # SQL rows.Close 检查

  # 禁用 linters
  disable:
    - scopelint       # 已废弃
    - gochecknoglobals # 检查全局变量
    - gochecknoinits  # 检查 init 函数

  # 新 linters (需要手动启用)
  enable-all: false

# linters 设置
linters-settings:
  errcheck:
    check-type-assertions: true
    check-blank: true
    ignore: "fmt:.*"

  govet:
    enable:
      - shadow
      - nilness
      - unusedresult
      - unusedwrite

  gocyclo:
    min-complexity: 15
    max-complexity: 30

  dupl:
    threshold: 100

  goimports:
    local-prefixes: github.com/x1t/tinyportmapper-go

  misspell:
    locale: US
    ignore-words:
      - armour
      - colour
      - centre
      - favourites
      - neighbour
      - realise
      - defence
      - musn

  whitespace:
    multi-if: true
    multi-func: true

  wsl:
    strict: true

# 问题输出配置
issues:
  # 排除规则
  exclude-rules:
    - path: _test\.go
      linters:
        - dupl
        - wsl
    - path: internal/types/
      linters:
        - gochecknoglobals
    - path: cmd/
      linters:
        - wsl

  # 新问题
  new: false
  # 相同问题最大显示数
  max-same-issues: 3
  # 每个 linter 最多问题数
  max-issues-per-linter: 50
  # 排除已知的 false positive
  exclude-known-issues: false

# 输出配置
output:
  format: colored-line-number
  print-issued-lines: true
  print-linter-name: true

# 覆盖默认配置
service:
  golang:
    go: "1.22"
